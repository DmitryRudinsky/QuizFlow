name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  lint:
    name: Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.5.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: TypeScript (via build)
        run: npm run build

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.5.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Vitest
        run: npm run test:run

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.5.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Functional E2E
        run: npx playwright test tests/e2e/public.spec.ts tests/e2e/auth.spec.ts tests/e2e/organizer.spec.ts tests/e2e/participant.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  visual:
    name: Visual snapshots
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.5.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # --update-snapshots generates Linux baselines on every run.
      # Download the artifact from a green main-branch run and commit
      # the *-linux.png files to lock in a visual baseline for PRs.
      - name: Generate visual snapshots
        run: npx playwright test tests/e2e/visual.spec.ts --update-snapshots

      - name: Upload Linux snapshots
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots-${{ github.sha }}
          path: frontend/tests/e2e/visual.spec.ts-snapshots/*-linux.png
          retention-days: 30
